services:
  backend:
    build: ./backend
    image: ${DOCKER_USERNAME}/studio-wit-backend:latest
    container_name: studio-wit-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks: [app-network]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/hello"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ${DOCKER_USERNAME}/studio-wit-frontend:latest
    container_name: studio-wit-frontend
    restart: unless-stopped
    profiles: ["with-frontend"]
    env_file: .env
    networks: [app-network]

  nginx:
    image: nginx:alpine
    container_name: studio-wit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks: [app-network]

networks:
  app-network:
    driver: bridge
