name: Slack PR Notification

on:
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pr-opened:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack - New PR
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "<!here> 🔔 새 PR이 올라왔습니다 - ${{ github.event.pull_request.title }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🔔 새 PR이 올라왔습니다"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<!here> 리뷰 부탁드립니다 🙏"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*제목:*\n${{ github.event.pull_request.title }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*작성자:*\n${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*브랜치:*\n`${{ github.head_ref }}` → `${{ github.base_ref }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*변경:*\n+${{ github.event.pull_request.additions }} / -${{ github.event.pull_request.deletions }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "PR 보기"
                      },
                      "url": "${{ github.event.pull_request.html_url }}"
                    }
                  ]
                }
              ]
            }

  pr-approved:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack - PR Approved
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *PR Approved!*\n*${{ github.event.pull_request.title }}*\n승인자: ${{ github.event.review.user.login }}\n<${{ github.event.pull_request.html_url }}|PR 보기>"
            }

  pr-comment:
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack - PR Comment
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "💬 *PR 코멘트*\n*${{ github.event.comment.user.login }}:*\n${{ github.event.comment.body }}\n<${{ github.event.comment.html_url }}|코멘트 보기>"
            }
