name: Slack PR Notification

on:
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pr-opened:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack - New PR
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "рҹ”” мғҲ PRмқҙ мҳ¬лқјмҷ”мҠөлӢҲлӢӨ"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*м ңлӘ©:*\n${{ github.event.pull_request.title }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*мһ‘м„ұмһҗ:*\n${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*лёҢлһңм№ҳ:*\n`${{ github.head_ref }}` вҶ’ `${{ github.base_ref }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*ліҖкІҪ:*\n+${{ github.event.pull_request.additions }} / -${{ github.event.pull_request.deletions }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "PR ліҙкё°"
                      },
                      "url": "${{ github.event.pull_request.html_url }}"
                    }
                  ]
                }
              ]
            }

  pr-approved:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack - PR Approved
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "вң… *PR Approved!*\n*${{ github.event.pull_request.title }}*\nмҠ№мқёмһҗ: ${{ github.event.review.user.login }}\n<${{ github.event.pull_request.html_url }}|PR ліҙкё°>"
            }

  pr-comment:
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack - PR Comment
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "рҹ’¬ *PR мҪ”л©ҳнҠё*\n*${{ github.event.comment.user.login }}:*\n${{ github.event.comment.body }}\n<${{ github.event.comment.html_url }}|мҪ”л©ҳнҠё ліҙкё°>"
            }
